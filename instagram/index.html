<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Instagram Clone — Home</title>
 <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <!-- Left: phone mock preview -->
    <section class="left">
      <div class="phone-frame">
        <div class="status-bar"></div>
        <div class="screen">
          <!-- Replace with your slideshow images -->
          <img src="instagram image.jpg" alt="Preview feed" />
        </div>
      </div>
    </section>

    <!-- Right: login card -->
    <section class="right">
      <div class="card">
        <div class="logo">Instagram</div>

        <input class="input" type="text" placeholder="Phone number, username, or email" />
        <input class="input" type="password" placeholder="Password" />

        <button class="btn">Log in</button>

        <div class="or">OR</div>

        <a class="fb-login" href="#">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook" />
          Log in with Facebook
        </a>

        <div class="forgot" style="margin-top:12px;">
          <a href="#">Forgot password?</a>
        </div>
      </div>

      <div class="signup">
        Don’t have an account? <a href="#">Sign up</a>
      </div>

      <div class="get-app">
        <p>Get the app.</p>
        <div class="badges">
          <!-- App Store badge -->
          <a class="badge" href="#">
            <svg viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10"></circle>
            </svg>
            <div>
              <div style="font-size:10px; opacity:.8">Download on the</div>
              <span>App Store</span>
            </div>
          </a>
          <!-- Google Play badge -->
          <a class="badge" href="#" style="background:#111">
            <svg viewBox="0 0 24 24" fill="#34a853" xmlns="http://www.w3.org/2000/svg">
              <polygon points="3,2 22,12 3,22 8,14 13,12 8,10"></polygon>
            </svg>
            <div>
              <div style="font-size:10px; opacity:.8">GET IT ON</div>
              <span>Google Play</span>
            </div>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <ul>
      <li><a href="#">Meta</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Blog</a></li>
      <li><a href="#">Jobs</a></li>
      <li><a href="#">Help</a></li>
      <li><a href="#">API</a></li>
      <li><a href="#">Privacy</a></li>
      <li><a href="#">Terms</a></li>
      <li><a href="#">Locations</a></li>
      <li><a href="#">Instagram Lite</a></li>
      <li><a href="#">Threads</a></li>
    </ul>
    <div>© 2026 Instagram Clone</div>
  </footer>

</body>
</html>
